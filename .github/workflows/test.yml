name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --experimental-sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Warm fastembed model cache
        run: |
          node --input-type=module -e "import { FlagEmbedding, EmbeddingModel } from 'fastembed'; await FlagEmbedding.init({ model: EmbeddingModel.AllMiniLML6V2 }); console.log('fastembed ready');"
      - run: npm test -- --maxWorkers=1
