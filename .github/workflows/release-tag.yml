name: release-tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --experimental-sqlite
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node >= 22.14.0 and npm CLI >= 11.5.1.
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
          # Avoid caching release builds (npm trusted-publishing guidance).
          cache: "npm"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: npm run release:verify-tag -- "${GITHUB_REF_NAME}"

      - name: Build
        run: npm run build

      - name: Warm fastembed model cache
        run: node scripts/warm-fastembed.mjs

      - name: Test
        run: npm test -- --maxWorkers=1

      - name: Sync plugin manifest versions
        run: npm run release:sync-plugins

      - name: Package plugin folders
        run: |
          mkdir -p dist/plugins
          zip -r "dist/plugins/claude-traceback-${GITHUB_REF_NAME}.zip" "plugins/claude-traceback"
          zip -r "dist/plugins/cursor-traceback-${GITHUB_REF_NAME}.zip" "plugins/cursor-traceback"

      - name: Generate checksums
        run: |
          cd dist/plugins
          sha256sum *.zip > checksums.txt

      # OIDC trusted publishing: do NOT set NODE_AUTH_TOKEN here.
      # setup-node writes `_authToken=${NODE_AUTH_TOKEN}` into the runner npmrc;
      # an empty/invalid token makes npm skip OIDC and fail with E404/ENEEDAUTH.
      - name: Publish npm package via OIDC
        run: |
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          fi
          npm --version
          node scripts/publish-npm.mjs --access public --provenance
      - name: Verify package on npm registry
        run: npm run release:ensure-published -- --wait --timeout-ms 120000

      - name: Create GitHub release with plugin artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/plugins/*.zip
            dist/plugins/checksums.txt

  sync-plugin-manifests-back:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --experimental-sqlite
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync plugin manifest versions
        run: npm run release:sync-plugins

      - name: Commit and push manifest sync
        run: |
          if git diff --quiet -- plugins/claude-traceback/.claude-plugin/plugin.json plugins/cursor-traceback/.cursor-plugin/plugin.json plugins/claude-traceback/skills/traceback/SKILL.md plugins/cursor-traceback/skills/traceback/SKILL.md; then
            echo "No plugin manifest/skill changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/claude-traceback/.claude-plugin/plugin.json plugins/cursor-traceback/.cursor-plugin/plugin.json plugins/claude-traceback/skills/traceback/SKILL.md plugins/cursor-traceback/skills/traceback/SKILL.md
          git commit -m "chore: sync plugin manifests and SKILL.md for ${GITHUB_REF_NAME}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
